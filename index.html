<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js" defer></script>
    <script src="app.js" defer></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <title>start</title>
</head>

<body>
    <header>
        <section>
            <div class="container">
                <div class="row">
                    <div class="col-md-12">
                        <nav>
                            <h2>Start Bootstrap</h2>
                            <h4>Features</h4>
                            <h4>download</h4>
                            <button><i class="fa-regular fa-comment-dots"></i>Send Feedback</button>
                        </nav>

                    </div>
                </div>
            </div>
        </section>

    </header>

    <main>
        <section id="showcase">
            <div class="container">
                <div class="row">
                    <div class="col-md-6">
                        <div class="box">
                            <div class="textbox">
                                <h1>Showcase <br> your app <br> beautifully.</h1>
                                <h3>Launch your mobile app landing page faster with this free, open source theme from
                                    Start
                                    Bootstrap!</h3>
                            </div>
                            <div class="imgbox play-app">
                                <img src="assets/google-play-badge.svg" alt="">
                                <img src="assets/app-store-badge.svg" alt="">
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="box-show">
                            <div class="circle-box">
                                <div class="circle"></div>

                                <i class="fa-solid fa-x"></i>
                                <i class="fa-solid fa-circle"></i>
                            </div>

                            <div class="videobox">

                                <video class="demo-video" autoplay muted loop playsinline preload="metadata">
                                    <source src="assets/demo-screen.webm" type="video/webm">
                                    <source src="assets/demo-screen.mp4" type="video/mp4">

                                </video>

                                <img src="assets/portrait_black.png" class="phone" alt="Phone Frame">

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="intuitive">
            <div class="container">
                <div class="row">
                    <div class="col-md-12">
                        <div class="textbox">
                            <h1>"An intuitive solution to a common problem that we all face, wrapped up in a single
                                app!"</h1>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-12">
                        <div class="imgbox">
                            <img src="assets/tnw-logo.svg" alt="">
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>

    </footer>
</body>

</html>
